front:
  text: 漁莊邂逅録
  hash: sha256:6e3a1a8e80ae5b55897737730a86aaabd160e48c3120c10bf03110b9ca7169ee
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0109_HFL_000-001a, image: hfl/0741/0741-186.png}
body:
  text: 高蓋山人自然子迷乾道八年歲次壬辰仲秋之月高蓋山人自然子會金陵虞仲謀西湖乘興因邂逅都録劉先生於漁莊因丁卯歲曾瞻識今復遇坐中先生因語昨夢福州王真人言未訖而自然今日談道若合符契昔自然子幼嘗夢三茅君授以丹訣後十年遇王先生傳金碧經旨而劉先生奉三茅君尤謹疑其昔夢所感也金碧經旨乃神農龍虎大丹祕訣歷古神仙莫不由此後皆立一經何啻百數皆古聖相傳開悟後學今之君子猶內不負心外不愧形上不欺天下不食言況古聖真人立虛文誑誤將來何至是乎奈何世人根鈍妄執迷謬愚魯顛倒深可哀愍古人云天上無懵懂神仙誠哉是言也凡修丹須要三人同心方可成事今自然子遇大道於人海中遍尋知音幾二十八年未見有參同者古仙云三人同志可修丹前向道之友李啓亮王及甫皆相繼而亡惟胡若谷存同試見效而力不及所獲者寡未能成功今既邂逅知音夢又若此豈非宿緣由是結為丹友以白露後一日丁未為首自然子治藥物虞公運水火而屬先生修火記焉居翌日先生曰可以記之愚知先生之心亦古至人之心欲以所試見效傳之將來接引後進耳遂秉筆書之因目為漁莊邂逅録云釋金液大還丹名老子云還丹金液與天相畢而金丹之術百數其要在神水華池須得神水然後生白金白金返黃金黃金返紫金紫金流液薰結鼎上而成丹金碧所謂隂陽混交接精液包元氣非有質之物可比也有質之物入人腸胃不能變化薰蒸久而藴結成疾所以貴乎金液者乃天地之元氣薰蒸入五內霧散若風雨魏公參同契載之詳矣還丹者太清經云水銀本是丹砂得今煉水銀還丹成故曰還丹元君曰砂有天地造化隂陽氣足自然成丹者內有曾青膽礬東雄黃西雌黃南朱砂北水銀而丹則輕清飛騰於上凡世之得道者乃上帝遣天官採以賜之而服食遂登雲漢今體天法道而煉之亦有此五相類生於其間乃五行之化也若以世上雜類為之必無還返之理矣故煉性者必絶去世務而煉丹者亦畜妻子居官爵煉性若成止於一身煉丹若成舉宅升天道至大而必授賢者故冠羣丹之首雖然在有福而有分而成其大用人命經云若積善多善星主之見善則善而為之必成若為惡多惡星主之而不信善仙道遠矣老君曰可得而獻則人莫不獻之其君可得而進則人莫不進其親可得而教則人莫不教其兄弟可得而傳則人莫不傳之子孫率土皆為仙矣誠可愼之味之第一轉配合隂陽名曰太初易曰一隂一陽之謂道偏隂偏陽之謂疾而配合隂陽又須得類自然之理也聖人由是觀天地之元氣採日月之精華取赤白二物象雞子形以為混沌金碧所謂雞子配合而生神物是也分數則寓於兩弦交會則猶於合璧以卦爻而運水火以時日而易歲月俾隂陽而成黑鉛太上所謂從紅入黑是真修是也草衣子云人之有身因父母傳氣而生非肉所化至藥亦然坎男離女性情相依結氣而成由聖人亦從胎生故曰從凡入聖也然受氣須足鄭真人云受氣若足為人聰明受氣不足為人暗昧不可不知又名先天鉛謂古未有天地混沌之初鉛得一而先形乃天地之元氣也彭真人云人之壽夭強弱皆因父母元氣所稟然乃濁亂之身而有限大丹乃聖母靈胎天地之元氣故無涯以無涯而續有限安得不與天地同壽耶蓋世間本無此鉛而因造化而有也道生於無有者乃天地之始有也遂名為萬物母也又云道生一通於一萬事畢蓋黑鉛屬水其數一人能通此則大丹能事畢矣今世人談道指無之理而為虛空又豈知杳杳冥冥其中有精耶第二轉混沌胚腪名曰太極經曰隂陽不測之謂神此鉛乃天生神物非世上五金八石之比其中包括天地日月隂陽八卦五行萬物之理伏羲氏之易神農氏之金碧經皆載此道也今夫三十六字與易八卦相為表裏曰龍虎朱雀玄武即四象也日月即坎離也火水土木金即五行也青白黑碧緑黃赤紫即九宫天地即乾坤也巽長女也艮少男也震為長男也兌為少女也甲丙戊庚壬乙丁己辛癸此五行之變大丹之道著矣此鉛是也今之學者各肆説紛紛馳騁不遇師傳安能窮理盡性以至於命者乎夫丹者乃日月交感而生故其文象日月混成之義故易取日月之義而卦首乾坤者乾本純陽乃白金之氣剛健而居上為天坤本純隂乃水土之質柔順而居下為地上下交感乾坤之陽入於坤是謂之坎坤中之隂入於乾是謂之離坎離者日月也乃天地之男女也日中有烏月中有兔隂中有陽陽中有隂此鉛乃日月之精華天地之魂魄也廣成子曰純燒天地隂陽髓煉大丹當自此始第三轉二儀剖判分別隂陽經曰天得一以清地得一以寧人得一以靈一者真一之謂也將此鉛入鼎中以汞澆之自然金花出而在外輕清之氣乾之象也砂土包而在外重濁之質坤之象也渾儀記曰天包地如殼中之黃天地之理於斯見矣純陽者積氣也不得不動而升上純隂者附形也不得不靜而處下隂陽之義於斯著矣道經曰純陽為仙純隂為鬼人也者居天地之中而稟隂陽之氣出入乎生死丹者長生不死之藥若煉而得此用汞澆之運火氣足混沌既判離中之隂自出坎中之陽自全復為乾體乃為純陽之物人服得仙不期然而然也易曰本乎天者親上身輕飛騰亦不期然而然也如此然後得名為丹砂非世上之丹砂故古歌曰白馬芽真丹砂淮南王煉秋石黃帝美金花又曰鉛是芽之母芽是鉛之子既得見金花捨鉛還不使為金花既是純陽則與天為徒而鉛殼隂物而河車般運既畢亦無用矣故云出隂入陽超凡入聖自是之後水銀一味獨幽玄矣第四轉攢簇五行變化四神古歌云不用藥用五行龍從火裏出虎向水中生此白馬芽乃金華白虎向黑鉛水中生也又以上等好丹砂飛出水銀乃龍從火裏出也二物一處用玉乳鎚鉢研三千下令相入謂之沐浴藥鏡云赤龍乾之德白虎亦如常研龍使如粉吸虎自相當是也遂以清泉淨浴其水蒼蒼色與天無異則金碧中一白二黑三緑四碧之次序於此可見再入鼎中運火氣足所出自然有曾青膽礬雄雌砂汞五彩之狀青者水銀蒼龍木精白者金華白虎金精赤者丹砂朱雀火精黑者黑鉛玄武水精此四者聖而不可知故謂之四神又名為聖無知草衣子云煉丹至此四神一切天人莫不敬仰猶天地日月不可觸犯神明必罰矣第五轉變化盡由中宫土德經曰天數五地數五五位相得而各有合五者中宫土位萬物生成之始終也故水得土而成數六火得土而成數七木得土而成數八金得土而成數九土得土而成數十煉丹既有四象必得土而後成故紫陽曰都緣彼此懷真土遂使金丹有返還所謂龍從火裏出者乃木三火二同為五左轉而成戊土也虎向水中生乃金四水一亦同為五右轉而為己土也彼此各懷真土至此而復歸于五與五合成可知矣煉大丹全在金火二用七赤九紫還返之道金火之成數畢而河圖生成之數槩可見矣太乙真君玉壺頌云房是青龍參是虎日為朱雀月玄武欲知大藥立玄基須得中央戊己土右取四神依前沐浴再入鼎中運火氣足並化真土其中自然現出金華如見金華可以勾溜崔公云乾汞勾濕汞溜無不住當以勾溜為驗矣肘後云見此土即是丹崔公云亦謂之龍胎大藥為其土中已煉丹體如子之在母胎也草衣子曰若人大功行未備未可飛升合修至此而止可以辟病延年住世為地仙耳然此藥煉至第三轉既胎凡胎為純陽體乃輕清飛騰之物若水火乖度則元氣失散藥便不靈雖得見土有質無魂服之即歸大腸雖能去病久亦生疾隂長生云得失在火卯酉刑德不可不知古今修煉之士莫不以此為大要者焉草衣子火候訣火自第一轉起十一月冬至至夜半子時受一陽之氣為復卦初九潛龍也俟時而行確乎不可拔十二月臨卦九二見龍在田君德也正月泰卦九三君子進德可與幾也二月大壯卦九四或躍在淵欲及時也藥中水銀上下無定三月夬卦九五飛龍在天得志也藥積陽為天四月乾卦上九亢龍有悔此時藥成乾體已全不可造化當積功纍行然後名山吉地潔淨之處齋戒沐浴方可下手鼎爐法象火候並不同前丹房中水火不可暫離香煙長久不絶蓋純陽之物功齊造化抱撲子及諸經皆云此時當祭爐祭太乙諸神並來監臨助作藥道人斯時不得輒生邪見并一切穢觸要生障礙故曰有悔修煉之士不可不信前後若此者多或為而不能成或成而不能服或服而不能靈遂以為魔殊不知丹砂陽物鬼神畏忌又況煉至純陽隂魔其能親耶此理曉然切忌切忌若能遵依禁戒自此漸漸通靈可造黃白直至九轉紫陽宫火足功全則一粒之功雞餐成鳳犬餌成龍點化金石並為至寶修真之士目諸經訣可以理推非漁莊之所能備録也古歌云欲言言不及林下好商量又云時人問我江南景秪道君行自得知昔黃真君注龍虎經畢乃留詩云物因不識香成賤言為玄微却被輕昨夜憑欄幾長嘯一輪秋月為誰明蓋傷知音之難遇也今既得侣録非徒然因喜成四韻附于卷末云丹中神水與華池學者如麻悟者稀但指氣精為造化豈知鉛汞有深微迷途到底生邪見大道何人為指歸今日相逢皆宿契與君容易泄天機十一月十八日開爐得先天鉛因紀其實云配合隂陽法自然得成此物號先天妙中妙妙妙真妙淵處淵淵淵又淵下手工夫終百日奪他造化幾千年從頭細試漁莊録方信神仙不浪傳二月十三日灰池炎灼得混沌胚腪灰池炎灼定浮沈見了方知造化深世上本來無此物人間終是少知音濛濛恍恍離宫本杳杳冥冥坎户金得一莫誇能事畢要勤功行合天心漁莊邂逅録
